<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmos — 3D Solar System Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    color: #e0e8ff;
    font-family: 'Space Mono', monospace;
    overflow: hidden;
    width: 100vw; height: 100vh;
    cursor: default;
  }
  #canvas { position: fixed; top: 0; left: 0; z-index: 0; }

  /* --- UI Overlay --- */
  #ui-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 10;
  }
  #ui-overlay > * { pointer-events: auto; }

  /* Title */
  #title-bar {
    position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
    font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 18px;
    letter-spacing: 6px; text-transform: uppercase;
    color: #7eb8ff; text-shadow: 0 0 20px rgba(126,184,255,0.5);
    pointer-events: none;
  }

  /* Tooltip */
  #tooltip {
    position: absolute; display: none;
    background: rgba(8,12,30,0.92); border: 1px solid rgba(126,184,255,0.3);
    border-radius: 8px; padding: 8px 14px;
    font-family: 'Orbitron', sans-serif; font-size: 12px; font-weight: 700;
    color: #a0c8ff; letter-spacing: 2px;
    text-shadow: 0 0 8px rgba(126,184,255,0.4);
    backdrop-filter: blur(6px);
    pointer-events: none; white-space: nowrap;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
  }

  /* Detail Panel */
  #detail-panel {
    position: absolute; top: 50%; right: 30px; transform: translateY(-50%);
    width: 320px; max-height: 80vh;
    background: rgba(6,10,28,0.94); border: 1px solid rgba(126,184,255,0.25);
    border-radius: 14px; padding: 28px 24px;
    backdrop-filter: blur(12px);
    box-shadow: 0 8px 40px rgba(0,0,0,0.7), inset 0 1px 0 rgba(126,184,255,0.1);
    display: none; overflow-y: auto;
    animation: panelIn 0.35s ease-out;
  }
  @keyframes panelIn {
    from { opacity: 0; transform: translateY(-50%) translateX(30px); }
    to { opacity: 1; transform: translateY(-50%) translateX(0); }
  }
  #detail-panel h2 {
    font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 20px;
    letter-spacing: 3px; margin-bottom: 4px;
  }
  #detail-panel .type-label {
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    color: #6a8ab0; margin-bottom: 16px;
  }
  #detail-panel .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
  .stat-box {
    background: rgba(126,184,255,0.05); border: 1px solid rgba(126,184,255,0.12);
    border-radius: 8px; padding: 10px;
  }
  .stat-box .label {
    font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
    color: #5a7a9e; margin-bottom: 4px;
  }
  .stat-box .value {
    font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 14px;
    color: #b0d4ff;
  }
  .stat-box .unit { font-size: 9px; color: #5a7a9e; margin-left: 3px; }
  #detail-panel .desc {
    margin-top: 16px; font-size: 12px; line-height: 1.7;
    color: #8aa4c0; border-top: 1px solid rgba(126,184,255,0.1);
    padding-top: 14px;
  }
  #close-panel {
    position: absolute; top: 14px; right: 14px;
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(126,184,255,0.08); border: 1px solid rgba(126,184,255,0.2);
    color: #7eb8ff; font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  #close-panel:hover { background: rgba(126,184,255,0.2); }

  /* Minimap */
  #minimap {
    position: absolute; bottom: 20px; left: 20px;
    width: 180px; height: 180px;
    background: rgba(6,10,28,0.85); border: 1px solid rgba(126,184,255,0.2);
    border-radius: 50%; overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  #minimap canvas { border-radius: 50%; }

  /* Zoom Bar */
  #zoom-bar {
    position: absolute; right: 20px; bottom: 20px;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  #zoom-bar button {
    width: 34px; height: 34px; border-radius: 8px;
    background: rgba(6,10,28,0.85); border: 1px solid rgba(126,184,255,0.2);
    color: #7eb8ff; font-family: 'Orbitron', sans-serif; font-size: 16px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  #zoom-bar button:hover { background: rgba(126,184,255,0.15); }
  #zoom-slider {
    -webkit-appearance: none; appearance: none;
    width: 6px; height: 120px;
    background: rgba(126,184,255,0.15); border-radius: 3px;
    writing-mode: bt-lr;
    -webkit-writing-mode: vertical-lr;
    outline: none;
    transform: rotate(180deg);
  }
  #zoom-slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 16px; height: 16px; border-radius: 50%;
    background: #7eb8ff; cursor: pointer;
    box-shadow: 0 0 8px rgba(126,184,255,0.6);
  }
  #zoom-slider::-moz-range-thumb {
    width: 16px; height: 16px; border-radius: 50%;
    background: #7eb8ff; cursor: pointer; border: none;
    box-shadow: 0 0 8px rgba(126,184,255,0.6);
  }

  /* Controls hint */
  #controls-hint {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    font-size: 10px; letter-spacing: 2px; color: #3a5a7e;
    pointer-events: none;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="ui-overlay">
  <div id="title-bar">Cosmos Explorer</div>
  <div id="tooltip"></div>
  <div id="detail-panel">
    <button id="close-panel">&times;</button>
    <h2 id="panel-name"></h2>
    <div class="type-label" id="panel-type"></div>
    <div class="stat-grid" id="panel-stats"></div>
    <div class="desc" id="panel-desc"></div>
  </div>
  <div id="minimap"><canvas id="minimap-canvas" width="180" height="180"></canvas></div>
  <div id="zoom-bar">
    <button id="zoom-in">+</button>
    <input type="range" id="zoom-slider" min="30" max="250" value="120" orient="vertical">
    <button id="zoom-out">&minus;</button>
  </div>
  <div id="controls-hint">DRAG TO ORBIT &middot; SCROLL TO ZOOM &middot; CLICK PLANET FOR INFO</div>
</div>

<script>
// ============================================================

// ============================================================

      mass: '14.5 M\u2295', radius: '3.98 R\u2295', temp: '76 K',

      mass: '1.3 M\u2295', radius: '1.15 R\u2295', temp: '280 K',

// ============================================================
// SHADER CODE
// ============================================================
const STAR_VERT = `
varying vec2 vUv;
varying vec3 vNormal;
varying vec3 vPosition;
void main() {
  vUv = uv;
  vNormal = normalize(normalMatrix * normal);
  vPosition = (modelViewMatrix * vec4(position, 1.0)).xyz;
  gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
}`;

const STAR_FRAG = `
uniform float uTime;
varying vec2 vUv;
varying vec3 vNormal;

// Simplex noise helpers
vec3 mod289(vec3 x){return x-floor(x*(1.0/289.0))*289.0;}
vec4 mod289(vec4 x){return x-floor(x*(1.0/289.0))*289.0;}
vec4 perm(vec4 x){return mod289(((x*34.0)+1.0)*x);}
float noise(vec3 p){
  vec3 a=floor(p);vec3 d=p-a;d=d*d*(3.0-2.0*d);
  vec4 b=a.xxyy+vec4(0.0,1.0,0.0,1.0);
  vec4 k1=perm(b.xyxy);vec4 k2=perm(k1.xyxy+b.zzww);
  vec4 c=k2+a.zzzz;vec4 k3=perm(c);vec4 k4=perm(c+1.0);
  vec4 o1=fract(k3*(1.0/41.0));vec4 o2=fract(k4*(1.0/41.0));
  vec4 o3=o2*d.z+o1*(1.0-d.z);vec2 o4=o3.yw*d.x+o3.xz*(1.0-d.x);
  return o4.y*d.y+o4.x*(1.0-d.y);
}
float fbm(vec3 p){float v=0.0;float a=0.5;for(int i=0;i<5;i++){v+=a*noise(p);p*=2.0;a*=0.5;}return v;}

void main(){
  vec3 p=vec3(vUv*4.0,uTime*0.15);
  float n=fbm(p)*0.6+fbm(p*3.0+uTime*0.1)*0.4;
  vec3 hot=vec3(1.0,0.95,0.7);
  vec3 warm=vec3(1.0,0.6,0.1);
  vec3 col=mix(warm,hot,n);
  float rim=1.0-max(dot(vNormal,vec3(0.0,0.0,1.0)),0.0);
  col+=vec3(1.0,0.8,0.3)*pow(rim,3.0)*0.5;
  gl_FragColor=vec4(col,1.0);
}`;

// Common vertex shader for planets
const PLANET_VERT = `
varying vec2 vUv;
varying vec3 vNormal;
varying vec3 vWorldPos;
varying vec3 vViewPos;
void main() {
  vUv = uv;
  vNormal = normalize(normalMatrix * normal);
  vec4 worldPos = modelMatrix * vec4(position, 1.0);
  vWorldPos = worldPos.xyz;
  vViewPos = (modelViewMatrix * vec4(position, 1.0)).xyz;
  gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
}`;

// Noise functions shared by all planet shaders
const NOISE_LIB = `
vec3 mod289(vec3 x){return x-floor(x*(1.0/289.0))*289.0;}
vec4 mod289(vec4 x){return x-floor(x*(1.0/289.0))*289.0;}
vec4 perm(vec4 x){return mod289(((x*34.0)+1.0)*x);}
float noise(vec3 p){
  vec3 a=floor(p);vec3 d=p-a;d=d*d*(3.0-2.0*d);
  vec4 b=a.xxyy+vec4(0.0,1.0,0.0,1.0);
  vec4 k1=perm(b.xyxy);vec4 k2=perm(k1.xyxy+b.zzww);
  vec4 c=k2+a.zzzz;vec4 k3=perm(c);vec4 k4=perm(c+1.0);
  vec4 o1=fract(k3*(1.0/41.0));vec4 o2=fract(k4*(1.0/41.0));
  vec4 o3=o2*d.z+o1*(1.0-d.z);vec2 o4=o3.yw*d.x+o3.xz*(1.0-d.x);
  return o4.y*d.y+o4.x*(1.0-d.y);
}
float fbm(vec3 p){float v=0.0;float a=0.5;for(int i=0;i<5;i++){v+=a*noise(p);p*=2.0;a*=0.5;}return v;}
`;

function makePlanetFrag(index) {
  const frags = [
    // 0 - Lava
    `uniform float uTime;uniform vec3 uColor;uniform vec3 uLightDir;
    varying vec2 vUv;varying vec3 vNormal;varying vec3 vViewPos;
    ${NOISE_LIB}
    void main(){
      vec3 p=vec3(vUv*5.0,uTime*0.08);
      float n=fbm(p);
      float cracks=smoothstep(0.42,0.48,n);
      vec3 dark=vec3(0.08,0.02,0.01);
      vec3 lava=vec3(1.0,0.35,0.02)*1.5;
      vec3 hotLava=vec3(1.0,0.85,0.2)*2.0;
      float pulse=sin(uTime*0.5+n*6.0)*0.5+0.5;
      vec3 glow=mix(lava,hotLava,pulse*cracks);
      vec3 col=mix(glow,dark,cracks);
      float diff=max(dot(vNormal,uLightDir),0.0)*0.6+0.4;
      col*=diff;
      float rim=1.0-max(dot(vNormal,normalize(-vViewPos)),0.0);
      col+=vec3(1.0,0.2,0.0)*pow(rim,3.0)*0.8;
      col+=vec3(1.0,0.5,0.1)*(1.0-cracks)*0.3;
      gl_FragColor=vec4(col,1.0);
    }`,
    // 1 - Terrestrial
    `uniform float uTime;uniform vec3 uColor;uniform vec3 uLightDir;
    varying vec2 vUv;varying vec3 vNormal;varying vec3 vViewPos;
    ${NOISE_LIB}
    void main(){
      vec3 p=vec3(vUv*6.0,0.5);
      float n=fbm(p);float n2=fbm(p*2.0+3.0);
      float land=smoothstep(0.38,0.52,n);
      vec3 ocean=vec3(0.04,0.15,0.45);
      vec3 shallow=vec3(0.06,0.25,0.5);
      vec3 beach=vec3(0.76,0.7,0.5);
      vec3 grass=vec3(0.15,0.45,0.12);
      vec3 forest=vec3(0.06,0.28,0.05);
      vec3 mountain=vec3(0.45,0.42,0.38);
      vec3 snow=vec3(0.92,0.94,0.96);
      vec3 col=mix(ocean,shallow,smoothstep(0.3,0.38,n));
      col=mix(col,beach,smoothstep(0.38,0.42,n));
      col=mix(col,grass,smoothstep(0.42,0.5,n));
      col=mix(col,forest,smoothstep(0.5,0.58,n));
      col=mix(col,mountain,smoothstep(0.58,0.68,n));
      col=mix(col,snow,smoothstep(0.68,0.75,n));
      float clouds=smoothstep(0.5,0.7,fbm(vec3(vUv*8.0+uTime*0.02,uTime*0.05)));
      col=mix(col,vec3(0.95),clouds*0.6);
      float diff=max(dot(vNormal,uLightDir),0.0)*0.7+0.3;
      col*=diff;
      float rim=1.0-max(dot(vNormal,normalize(-vViewPos)),0.0);
      col+=vec3(0.3,0.5,0.9)*pow(rim,4.0)*0.4;
      gl_FragColor=vec4(col,1.0);
    }`,
    // 2 - Gas Giant
    `uniform float uTime;uniform vec3 uColor;uniform vec3 uLightDir;
    varying vec2 vUv;varying vec3 vNormal;varying vec3 vViewPos;
    ${NOISE_LIB}
    void main(){
      float lat=vUv.y;
      float bands=sin(lat*40.0)*0.5+0.5;
      float turb=fbm(vec3(vUv.x*10.0+uTime*0.03,lat*20.0,uTime*0.02));
      vec3 c1=vec3(0.85,0.65,0.35);
      vec3 c2=vec3(0.65,0.4,0.2);
      vec3 c3=vec3(0.95,0.85,0.65);
      vec3 c4=vec3(0.55,0.3,0.15);
      vec3 col=mix(c1,c2,bands);
      col=mix(col,c3,turb*0.4);
      col=mix(col,c4,sin(lat*80.0+turb*4.0)*0.3+0.3);
      // Great storm
      float stormDist=length(vec2((vUv.x-0.6)*2.0,vUv.y-0.35)*vec2(3.0,5.0));
      float storm=smoothstep(1.0,0.0,stormDist);
      float stormSwirl=fbm(vec3(vUv*20.0+uTime*0.1,uTime*0.05));
      col=mix(col,vec3(0.9,0.4,0.2),storm*0.6*stormSwirl);
      float diff=max(dot(vNormal,uLightDir),0.0)*0.5+0.5;
      col*=diff;
      float rim=1.0-max(dot(vNormal,normalize(-vViewPos)),0.0);
      col+=vec3(0.9,0.7,0.4)*pow(rim,4.0)*0.3;
      gl_FragColor=vec4(col,1.0);
    }`,
    // 3 - Ice
    `uniform float uTime;uniform vec3 uColor;uniform vec3 uLightDir;
    varying vec2 vUv;varying vec3 vNormal;varying vec3 vViewPos;
    ${NOISE_LIB}
    void main(){
      vec3 p=vec3(vUv*8.0,uTime*0.02);
      float n=fbm(p);float n2=fbm(p*3.0+5.0);
      float cracks=smoothstep(0.45,0.5,abs(n-0.5)*2.0);
      vec3 ice=vec3(0.7,0.9,0.98);
      vec3 deepIce=vec3(0.3,0.55,0.75);
      vec3 crack=vec3(0.15,0.35,0.65);
      vec3 frost=vec3(0.92,0.96,1.0);
      vec3 col=mix(deepIce,ice,n);
      col=mix(col,frost,n2*0.4);
      col=mix(col,crack,(1.0-cracks)*0.5);
      float spec=pow(max(dot(reflect(-uLightDir,vNormal),normalize(-vViewPos)),0.0),32.0);
      float diff=max(dot(vNormal,uLightDir),0.0)*0.6+0.4;
      col*=diff;
      col+=vec3(0.8,0.9,1.0)*spec*0.5;
      float rim=1.0-max(dot(vNormal,normalize(-vViewPos)),0.0);
      col+=vec3(0.5,0.75,1.0)*pow(rim,3.0)*0.5;
      gl_FragColor=vec4(col,1.0);
    }`,
    // 4 - Ice Giant
    `uniform float uTime;uniform vec3 uColor;uniform vec3 uLightDir;
    varying vec2 vUv;varying vec3 vNormal;varying vec3 vViewPos;
    ${NOISE_LIB}
    void main(){
      float lat=vUv.y;
      float bands=sin(lat*25.0+uTime*0.05)*0.5+0.5;
      float turb=fbm(vec3(vUv.x*8.0+uTime*0.02,lat*15.0,uTime*0.015));
      vec3 c1=vec3(0.2,0.45,0.85);
      vec3 c2=vec3(0.15,0.35,0.7);
      vec3 c3=vec3(0.35,0.6,0.95);
      vec3 c4=vec3(0.1,0.25,0.55);
      vec3 col=mix(c1,c2,bands);
      col=mix(col,c3,turb*0.35);
      col=mix(col,c4,sin(lat*50.0+turb*3.0)*0.25+0.25);
      float diff=max(dot(vNormal,uLightDir),0.0)*0.5+0.5;
      col*=diff;
      float rim=1.0-max(dot(vNormal,normalize(-vViewPos)),0.0);
      col+=vec3(0.3,0.5,1.0)*pow(rim,3.5)*0.5;
      gl_FragColor=vec4(col,1.0);
    }`,
    // 5 - Desert
    `uniform float uTime;uniform vec3 uColor;uniform vec3 uLightDir;
    varying vec2 vUv;varying vec3 vNormal;varying vec3 vViewPos;
    ${NOISE_LIB}
    void main(){
      vec3 p=vec3(vUv*7.0,0.3);
      float n=fbm(p);float n2=fbm(p*3.0+2.0);
      vec3 sand=vec3(0.85,0.68,0.38);
      vec3 darkSand=vec3(0.65,0.45,0.22);
      vec3 rock=vec3(0.5,0.38,0.25);
      vec3 dunes=vec3(0.92,0.78,0.48);
      vec3 polar=vec3(0.9,0.88,0.85);
      vec3 col=mix(darkSand,sand,n);
      col=mix(col,dunes,n2*0.5);
      col=mix(col,rock,smoothstep(0.6,0.75,n)*0.6);
      float polarCap=smoothstep(0.85,0.95,abs(vUv.y-0.5)*2.0);
      col=mix(col,polar,polarCap);
      float dust=fbm(vec3(vUv*12.0+uTime*0.04,uTime*0.06));
      col=mix(col,vec3(0.85,0.6,0.3),smoothstep(0.55,0.7,dust)*0.25);
      float diff=max(dot(vNormal,uLightDir),0.0)*0.7+0.3;
      col*=diff;
      float rim=1.0-max(dot(vNormal,normalize(-vViewPos)),0.0);
      col+=vec3(0.9,0.6,0.2)*pow(rim,3.0)*0.3;
      gl_FragColor=vec4(col,1.0);
    }`,
    // 6 - Ocean
    `uniform float uTime;uniform vec3 uColor;uniform vec3 uLightDir;
    varying vec2 vUv;varying vec3 vNormal;varying vec3 vViewPos;
    ${NOISE_LIB}
    void main(){
      vec3 p=vec3(vUv*6.0,uTime*0.04);
      float n=fbm(p);float n2=fbm(p*2.5+1.0);
      vec3 deep=vec3(0.02,0.08,0.3);
      vec3 mid=vec3(0.05,0.2,0.55);
      vec3 shallow=vec3(0.1,0.4,0.7);
      vec3 foam=vec3(0.6,0.75,0.9);
      vec3 col=mix(deep,mid,n);
      col=mix(col,shallow,n2*0.4);
      float waves=sin(vUv.x*60.0+uTime*0.3+n*8.0)*0.5+0.5;
      col=mix(col,foam,waves*0.08);
      float clouds=smoothstep(0.48,0.7,fbm(vec3(vUv*10.0+uTime*0.03,uTime*0.04)));
      col=mix(col,vec3(0.85,0.9,0.95),clouds*0.5);
      float spec=pow(max(dot(reflect(-uLightDir,vNormal),normalize(-vViewPos)),0.0),64.0);
      float diff=max(dot(vNormal,uLightDir),0.0)*0.6+0.4;
      col*=diff;
      col+=vec3(0.7,0.85,1.0)*spec*0.4;
      float rim=1.0-max(dot(vNormal,normalize(-vViewPos)),0.0);
      col+=vec3(0.2,0.4,0.9)*pow(rim,3.0)*0.5;
      gl_FragColor=vec4(col,1.0);
    }`
  ];
  return frags[index];
}

// Atmosphere glow shader
const ATMO_VERT = `
varying vec3 vNormal;
varying vec3 vViewPos;
void main(){
  vNormal = normalize(normalMatrix * normal);
  vViewPos = (modelViewMatrix * vec4(position,1.0)).xyz;
  gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
}`;
const ATMO_FRAG = `
uniform vec3 uColor;
uniform float uIntensity;
varying vec3 vNormal;
varying vec3 vViewPos;
void main(){
  float rim = 1.0 - max(dot(vNormal, normalize(-vViewPos)), 0.0);
  float glow = pow(rim, 3.0) * uIntensity;
  gl_FragColor = vec4(uColor, glow * 0.7);
}`;

// Ring shader
const RING_VERT = `
varying vec2 vUv;
void main(){
  vUv = uv;
  gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
}`;
const RING_FRAG = `
uniform vec3 uColor;
uniform float uTime;
varying vec2 vUv;
void main(){
  float r = length(vUv - 0.5) * 2.0;
  if(r < 0.4 || r > 1.0) discard;
  float band1 = smoothstep(0.0, 0.02, abs(sin(r * 40.0))) * 0.6 + 0.4;
  float band2 = smoothstep(0.0, 0.03, abs(sin(r * 25.0 + 1.5))) * 0.3 + 0.7;
  float gap1 = smoothstep(0.0, 0.01, abs(r - 0.62)) * smoothstep(0.0, 0.01, abs(r - 0.74));
  float alpha = band1 * band2 * gap1;
  alpha *= smoothstep(1.0, 0.85, r) * smoothstep(0.4, 0.5, r);
  vec3 col = uColor * (0.8 + 0.2 * sin(r * 60.0));
  gl_FragColor = vec4(col, alpha * 0.55);
}`;

// ============================================================
// THREE.JS SETUP
// ============================================================
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 2000);
camera.position.set(0, 60, 120);

// Camera orbit controls (manual)
let camTheta = 0, camPhi = 0.6, camDist = 120, targetDist = 120;
let camTarget = new THREE.Vector3(0, 0, 0);
let isDragging = false, prevMouse = { x: 0, y: 0 };

// ============================================================
// STARFIELD
// ============================================================
function createStarfield() {
  const count = 6000;
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  const cols = new Float32Array(count * 3);
  const sizes = new Float32Array(count);
  for (let i = 0; i < count; i++) {
    const r = 400 + Math.random() * 600;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    pos[i*3] = r * Math.sin(phi) * Math.cos(theta);
    pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    pos[i*3+2] = r * Math.cos(phi);
    const temp = Math.random();
    if (temp < 0.3) { cols[i*3]=0.7; cols[i*3+1]=0.8; cols[i*3+2]=1.0; }
    else if (temp < 0.6) { cols[i*3]=1.0; cols[i*3+1]=0.95; cols[i*3+2]=0.8; }
    else { cols[i*3]=1.0; cols[i*3+1]=1.0; cols[i*3+2]=1.0; }
    sizes[i] = 0.5 + Math.random() * 1.5;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(cols, 3));
  geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
  const mat = new THREE.PointsMaterial({ size: 1.2, vertexColors: true, transparent: true, opacity: 0.85, sizeAttenuation: false });
  scene.add(new THREE.Points(geo, mat));
}
createStarfield();

// ============================================================
// SUN
// ============================================================
const sunGeo = new THREE.SphereGeometry(5, 64, 64);
const sunMat = new THREE.ShaderMaterial({
  vertexShader: STAR_VERT, fragmentShader: STAR_FRAG,
  uniforms: { uTime: { value: 0 } }
});
const sun = new THREE.Mesh(sunGeo, sunMat);
scene.add(sun);

// Sun glow
const sunGlowGeo = new THREE.SphereGeometry(7.5, 32, 32);
const sunGlowMat = new THREE.ShaderMaterial({
  vertexShader: ATMO_VERT, fragmentShader: ATMO_FRAG,
  uniforms: { uColor: { value: new THREE.Color(1.0, 0.7, 0.2) }, uIntensity: { value: 2.0 } },
  transparent: true, side: THREE.BackSide, depthWrite: false
});
scene.add(new THREE.Mesh(sunGlowGeo, sunGlowMat));

// Sun light
const sunLight = new THREE.PointLight(0xffeedd, 2.0, 500);
scene.add(sunLight);
scene.add(new THREE.AmbientLight(0x1a2040, 0.4));

// ============================================================
// CREATE PLANETS
// ============================================================
const planetObjects = [];
const clickTargets = [];

PLANETS.forEach((pData, idx) => {
  const group = new THREE.Group();
  // Orbit line
  const orbitGeo = new THREE.BufferGeometry();
  const orbitPts = [];
  for (let i = 0; i <= 128; i++) {
    const a = (i / 128) * Math.PI * 2;
    orbitPts.push(Math.cos(a) * pData.orbitRadius, 0, Math.sin(a) * pData.orbitRadius);
  }
  orbitGeo.setAttribute('position', new THREE.Float32BufferAttribute(orbitPts, 3));
  const orbitLine = new THREE.Line(orbitGeo, new THREE.LineBasicMaterial({
    color: 0x1a3050, transparent: true, opacity: 0.3
  }));
  scene.add(orbitLine);

  // Planet mesh
  const geo = new THREE.SphereGeometry(pData.radius, 64, 64);
  const mat = new THREE.ShaderMaterial({
    vertexShader: PLANET_VERT, fragmentShader: makePlanetFrag(idx),
    uniforms: {
      uTime: { value: 0 },
      uColor: { value: new THREE.Color(...pData.color) },
      uLightDir: { value: new THREE.Vector3(1, 0.5, 0).normalize() }
    }
  });
  const mesh = new THREE.Mesh(geo, mat);
  group.add(mesh);

  // Atmosphere
  const atmoColors = [
    [1.0, 0.3, 0.0], [0.3, 0.5, 0.9], [0.9, 0.7, 0.4],
    [0.5, 0.75, 1.0], [0.3, 0.5, 1.0], [0.9, 0.6, 0.2], [0.2, 0.4, 0.9]
  ];
  const atmoGeo = new THREE.SphereGeometry(pData.radius * 1.15, 32, 32);
  const atmoMat = new THREE.ShaderMaterial({
    vertexShader: ATMO_VERT, fragmentShader: ATMO_FRAG,
    uniforms: {
      uColor: { value: new THREE.Color(...atmoColors[idx]) },
      uIntensity: { value: 1.5 }
    },
    transparent: true, side: THREE.BackSide, depthWrite: false
  });
  group.add(new THREE.Mesh(atmoGeo, atmoMat));

  // Rings
  if (pData.hasRings) {
    const ringGeo = new THREE.PlaneGeometry(pData.radius * 5, pData.radius * 5);
    const ringMat = new THREE.ShaderMaterial({
      vertexShader: RING_VERT, fragmentShader: RING_FRAG,
      uniforms: {
        uColor: { value: new THREE.Color(...pData.ringColor) },
        uTime: { value: 0 }
      },
      transparent: true, side: THREE.DoubleSide, depthWrite: false
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = -Math.PI / 2 + 0.15;
    ring.userData.isRing = true;
    group.add(ring);
  }

  // Moons
  for (let m = 0; m < pData.moons; m++) {
    const moonGeo = new THREE.SphereGeometry(pData.radius * 0.15, 16, 16);
    const moonMat = new THREE.MeshStandardMaterial({
      color: new THREE.Color(0.6 + m * 0.1, 0.6 + m * 0.05, 0.65),
      roughness: 0.9, metalness: 0.1
    });
    const moon = new THREE.Mesh(moonGeo, moonMat);
    moon.userData = { moonIdx: m, dist: pData.radius * (2.2 + m * 1.0), speed: 1.5 + m * 0.5 };
    group.add(moon);
  }

  group.rotation.z = pData.tilt;
  scene.add(group);

  planetObjects.push({
    group, mesh, data: pData, mat,
    angle: Math.random() * Math.PI * 2
  });
  clickTargets.push(mesh);
});

// ============================================================
// RAYCASTER & INTERACTION
// ============================================================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const tooltip = document.getElementById('tooltip');
const detailPanel = document.getElementById('detail-panel');
let hoveredPlanet = null;
let selectedPlanet = null;

function onMouseMove(e) {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  if (isDragging) {
    const dx = e.clientX - prevMouse.x;
    const dy = e.clientY - prevMouse.y;
    camTheta -= dx * 0.005;
    camPhi = Math.max(0.1, Math.min(Math.PI - 0.1, camPhi - dy * 0.005));
    prevMouse.x = e.clientX;
    prevMouse.y = e.clientY;
    return;
  }

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(clickTargets);
  if (intersects.length > 0) {
    const obj = intersects[0].object;
    const pObj = planetObjects.find(p => p.mesh === obj);
    if (pObj) {
      hoveredPlanet = pObj;
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX + 16) + 'px';
      tooltip.style.top = (e.clientY - 10) + 'px';
      tooltip.textContent = pObj.data.name;
      canvas.style.cursor = 'pointer';
    }
  } else {
    hoveredPlanet = null;
    tooltip.style.display = 'none';
    canvas.style.cursor = isDragging ? 'grabbing' : 'default';
  }
}

function onClick(e) {
  if (isDragging) return;
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(clickTargets);
  if (intersects.length > 0) {
    const obj = intersects[0].object;
    const pObj = planetObjects.find(p => p.mesh === obj);
    if (pObj) {
      selectedPlanet = pObj;
      showPanel(pObj.data);
    }
  }
}

function showPanel(data) {
  document.getElementById('panel-name').textContent = data.name;
  document.getElementById('panel-name').style.color =
    `rgb(${Math.round(data.color[0]*255)},${Math.round(data.color[1]*255)},${Math.round(data.color[2]*255)})`;
  document.getElementById('panel-type').textContent = data.type;
  const statsEl = document.getElementById('panel-stats');
  statsEl.innerHTML = '';
  const labels = { mass:'Mass', radius:'Radius', temp:'Surface Temp', gravity:'Gravity',
    day:'Day Length', year:'Orbital Period', atmosphere:'Atmosphere', pressure:'Pressure' };
  for (const [key, label] of Object.entries(labels)) {
    if (data.stats[key]) {
      statsEl.innerHTML += `<div class="stat-box"><div class="label">${label}</div><div class="value">${data.stats[key]}</div></div>`;
    }
  }
  document.getElementById('panel-desc').textContent = data.desc;
  detailPanel.style.display = 'block';
}

document.getElementById('close-panel').addEventListener('click', () => {
  detailPanel.style.display = 'none';
  selectedPlanet = null;
});

canvas.addEventListener('mousemove', onMouseMove);
canvas.addEventListener('click', onClick);
canvas.addEventListener('mousedown', (e) => {
  if (e.button === 0) { isDragging = false; prevMouse.x = e.clientX; prevMouse.y = e.clientY; }
});
window.addEventListener('mousemove', (e) => {
  if (e.buttons === 1) {
    const dx = Math.abs(e.clientX - prevMouse.x);
    const dy = Math.abs(e.clientY - prevMouse.y);
    if (dx > 3 || dy > 3) isDragging = true;
  }
});
canvas.addEventListener('mouseup', () => { setTimeout(() => isDragging = false, 10); });

// Zoom
function handleZoom(delta) {
  targetDist = Math.max(30, Math.min(250, targetDist + delta));
  document.getElementById('zoom-slider').value = targetDist;
}
canvas.addEventListener('wheel', (e) => { e.preventDefault(); handleZoom(e.deltaY * 0.1); }, { passive: false });
document.getElementById('zoom-slider').addEventListener('input', (e) => { targetDist = parseFloat(e.target.value); });
document.getElementById('zoom-in').addEventListener('click', () => handleZoom(-15));
document.getElementById('zoom-out').addEventListener('click', () => handleZoom(15));

// ============================================================
// MINIMAP
// ============================================================
const minimapCanvas = document.getElementById('minimap-canvas');
const mctx = minimapCanvas.getContext('2d');

function drawMinimap() {
  const w = 180, h = 180, cx = w/2, cy = h/2, scale = 0.82;
  mctx.clearRect(0, 0, w, h);

  // Background
  mctx.fillStyle = 'rgba(4,8,20,0.9)';
  mctx.beginPath(); mctx.arc(cx, cy, 88, 0, Math.PI*2); mctx.fill();

  // Orbits
  PLANETS.forEach(p => {
    const r = p.orbitRadius * scale;
    mctx.strokeStyle = 'rgba(60,100,150,0.2)';
    mctx.lineWidth = 0.5;
    mctx.beginPath(); mctx.arc(cx, cy, r, 0, Math.PI*2); mctx.stroke();
  });

  // Sun
  const grad = mctx.createRadialGradient(cx, cy, 0, cx, cy, 5);
  grad.addColorStop(0, '#ffe080'); grad.addColorStop(1, 'rgba(255,180,50,0)');
  mctx.fillStyle = grad;
  mctx.beginPath(); mctx.arc(cx, cy, 5, 0, Math.PI*2); mctx.fill();
  mctx.fillStyle = '#ffe880';
  mctx.beginPath(); mctx.arc(cx, cy, 2, 0, Math.PI*2); mctx.fill();

  // Planets
  planetObjects.forEach((pObj, i) => {
    const r = pObj.data.orbitRadius * scale;
    const x = cx + Math.cos(pObj.angle) * r;
    const y = cy + Math.sin(pObj.angle) * r;
    const c = pObj.data.color;
    mctx.fillStyle = `rgb(${Math.round(c[0]*255)},${Math.round(c[1]*255)},${Math.round(c[2]*255)})`;
    const dotSize = Math.max(1.5, pObj.data.radius * 0.7);
    mctx.beginPath(); mctx.arc(x, y, dotSize, 0, Math.PI*2); mctx.fill();
  });

  // Camera indicator
  const camX = cx + (camera.position.x * scale * 0.5);
  const camZ = cy + (camera.position.z * scale * 0.5);
  mctx.strokeStyle = 'rgba(126,184,255,0.7)';
  mctx.lineWidth = 1;
  mctx.beginPath(); mctx.arc(Math.max(cx-85,Math.min(cx+85,camX)), Math.max(cy-85,Math.min(cy+85,camZ)), 3, 0, Math.PI*2); mctx.stroke();
}

// ============================================================
// ANIMATION LOOP
// ============================================================
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  const dt = clock.getDelta();

  // Update sun
  sunMat.uniforms.uTime.value = t;

  // Update planets
  planetObjects.forEach((pObj) => {
    pObj.angle += pObj.data.orbitSpeed * 0.005;
    const x = Math.cos(pObj.angle) * pObj.data.orbitRadius;
    const z = Math.sin(pObj.angle) * pObj.data.orbitRadius;
    pObj.group.position.set(x, 0, z);
    pObj.mesh.rotation.y += pObj.data.rotationSpeed;
    pObj.mat.uniforms.uTime.value = t;

    // Light direction from sun
    const toSun = new THREE.Vector3(-x, 0, -z).normalize();
    const lightDir = toSun.clone().applyMatrix3(new THREE.Matrix3().setFromMatrix4(camera.matrixWorldInverse)).normalize();
    pObj.mat.uniforms.uLightDir.value.copy(lightDir);

    // Rings
    pObj.group.children.forEach(child => {
      if (child.userData.isRing && child.material.uniforms) {
        child.material.uniforms.uTime.value = t;
      }
      // Moons
      if (child.userData.moonIdx !== undefined) {
        const md = child.userData;
        const ma = t * md.speed + md.moonIdx * 2.0;
        child.position.set(
          Math.cos(ma) * md.dist,
          Math.sin(ma * 0.3) * md.dist * 0.1,
          Math.sin(ma) * md.dist
        );
      }
    });
  });

  // Camera smoothing
  camDist += (targetDist - camDist) * 0.08;
  camera.position.x = camTarget.x + camDist * Math.sin(camPhi) * Math.sin(camTheta);
  camera.position.y = camTarget.y + camDist * Math.cos(camPhi);
  camera.position.z = camTarget.z + camDist * Math.sin(camPhi) * Math.cos(camTheta);
  camera.lookAt(camTarget);

  renderer.render(scene, camera);

  // Minimap at reduced rate
  if (Math.floor(t * 10) % 3 === 0) drawMinimap();
}
animate();

// ============================================================
// RESIZE
// ============================================================
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
