name: Urgent Issue Trigger

on:
  issues:
    types: [opened, labeled]

jobs:
  trigger-pipeline:
    runs-on: ubuntu-latest

    # Only run if:
    # - Issue title starts with "IMPORTANT:" OR
    # - Label "urgent" was just added
    if: |
      startsWith(github.event.issue.title, 'IMPORTANT:') ||
      github.event.label.name == 'urgent' ||
      contains(github.event.issue.labels.*.name, 'urgent')

    steps:
      - name: Trigger pipeline on server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/felix/projects/cosmos

            # Pass issue number as env variable for log folder naming
            export COSMOS_ISSUE_NUM="${{ github.event.issue.number }}"

            # Run pipeline in background so SSH doesn't hang
            nohup env COSMOS_ISSUE_NUM="$COSMOS_ISSUE_NUM" ./scripts/daily_pipeline.sh >> logs/urgent_$(date +%Y-%m-%d_%H-%M).log 2>&1 &

            echo "Pipeline triggered for issue #${{ github.event.issue.number }}"
